<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Zyths AI - AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            background: #ffffff;
            font-family: 'Inter', 'Poppins', sans-serif;
            overflow: hidden;
        }

        .intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        .intro-screen.hide {
            opacity: 0;
            visibility: hidden;
        }
        .intro-content {
            text-align: center;
        }
        .intro-text {
            color: #712375;
            font-size: clamp(1rem, 6vw, 1.5rem);
            font-weight: 500;
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }
        .booting-text {
            margin-right: 8px;
        }
        .dots {
            display: inline-flex;
            gap: 6px;
        }
        .dots span {
            font-size: clamp(1rem, 6vw, 1.5rem);
            animation: softBlink 2s infinite ease-in-out;
            opacity: 0;
            display: inline-block;
        }
        .dots span:nth-child(1) { animation-delay: 0s; }
        .dots span:nth-child(2) { animation-delay: 0.4s; }
        .dots span:nth-child(3) { animation-delay: 0.8s; }

        @keyframes softBlink {
            0%, 100% { opacity: 0.15; transform: translateY(0);}
            50% { opacity: 1; transform: translateY(-3px);}
        }

        .app-container {
            display: flex;
            height: 100%;
            width: 100%;
            position: relative;
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.3);
            z-index: 25;
            display: none;
        }
        .sidebar-overlay.show {
            display: block;
        }
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: #f8f8f8;
            border-right: 1px solid #e5e5e5;
            display: flex;
            flex-direction: column;
            transition: left 0.3s ease;
            z-index: 30;
        }
        .sidebar.open {
            left: 0;
        }
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #e5e5e5;
            background: #ffffff;
        }
        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        .chat-item {
            background: #ffffff;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            border: 1px solid #e5e5e5;
            transition: all 0.2s;
            user-select: none;
        }
        .chat-item.active {
            background: #f3e5f5;
            border-color: #712375;
        }
        .chat-item.active .chat-title {
            color: #712375;
            font-weight: 600;
        }
        .chat-item.press {
            transform: scale(0.98);
            background: #e0e0e0;
        }
        .chat-title {
            color: #333333;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f5f5f5;
            height: 100%;
            width: 100%;
        }
        .chat-header {
            background: #ffffff;
            padding: 12px 16px;
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            gap: 10px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .menu-btn {
            background: transparent;
            border: 1px solid #e5e5e5;
            color: #712375;
            font-size: 20px;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
        }
        .chat-header h1 {
            color: #712375;
            font-size: 1.2rem;
            font-weight: 600;
            margin: 0;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .api-system-btn {
            background: transparent;
            border: 1px solid #e5e5e5;
            color: #712375;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 10px;
            cursor: pointer;
        }
        .new-chat-icon {
            background: transparent;
            border: 1px solid #712375;
            color: #712375;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .new-chat-icon:hover {
            background: #f3e5f5;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #f5f5f5;
            scroll-behavior: smooth;
        }
        
        .message {
            display: flex;
            flex-direction: column;
            width: 100%;
            animation: fadeInUp 0.3s ease-out;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message-name {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .message.user .message-name {
            color: #712375;
        }
        .message.bot .message-name {
            color: #712375;
        }
        
        .bubble {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            font-family: 'Inter', sans-serif;
            max-width: 100%;
        }
        
        .message.user .bubble {
            background: #712375;
            color: white;
        }
        
        .message.bot .bubble {
            background: #ffffff;
            color: #333333;
            border: 1px solid #e5e5e5;
        }
        
        .message.bot .bubble strong {
            font-weight: 700;
            color: #712375;
        }
        .message.bot .bubble em {
            font-style: italic;
            color: #712375;
        }
        .message.bot .bubble ul, .message.bot .bubble ol {
            margin: 8px 0;
            padding-left: 20px;
        }
        .message.bot .bubble li {
            margin: 4px 0;
        }
        .message.bot .bubble hr {
            margin: 10px 0;
            border: none;
            height: 1px;
            background: #e5e5e5;
        }
        .message.bot .bubble code {
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.9em;
        }
        .message.bot .bubble pre {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 10px;
            overflow-x: auto;
            margin: 8px 0;
        }
        
        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 12px 16px;
            background: #ffffff;
            border-radius: 12px;
            width: fit-content;
            border: 1px solid #e5e5e5;
        }
        .typing-indicator span {
            width: 7px;
            height: 7px;
            background: #712375;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }
        @keyframes bounce {
            0%,60%,100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-5px); opacity: 1; }
        }

        .api-input {
            background: #ffffff;
            padding: 8px 12px;
            border-top: 1px solid #e5e5e5;
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .api-input.hide { display: none; }
        .api-input input {
            flex: 1;
            background: #f8f8f8;
            border: 1px solid #e5e5e5;
            color: #333333;
            padding: 8px 12px;
            border-radius: 25px;
            font-size: 11px;
            outline: none;
        }
        .api-input input:focus {
            border-color: #712375;
        }
        .api-input button {
            background: #712375;
            border: none;
            color: white;
            padding: 6px 14px;
            border-radius: 25px;
            cursor: pointer;
        }

        .input-area {
            background: #ffffff;
            padding: 10px;
            border-top: 1px solid #e5e5e5;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }
        .input-area input {
            flex: 1;
            background: #f8f8f8;
            border: 1px solid #e5e5e5;
            color: #333333;
            padding: 10px 14px;
            border-radius: 30px;
            font-size: 13px;
            outline: none;
            transition: all 0.2s;
        }
        .input-area input:focus { 
            border-color: #712375;
            box-shadow: 0 0 0 2px rgba(113, 35, 117, 0.1);
        }
        .input-area input::placeholder {
            color: #aaaaaa;
            font-size: 12px;
        }
        .btn-send {
            background: #712375;
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
            transition: background 0.2s;
        }
        .btn-send:hover {
            background: #5a155a;
        }
        .btn-send:active { transform: scale(0.97); }
    </style>
</head>
<body>
    <div class="intro-screen" id="introScreen">
        <div class="intro-content">
            <div class="intro-text">
                <span class="booting-text">Zyths AI is booting</span>
                <span class="dots"><span>.</span><span>.</span><span>.</span></span>
            </div>
        </div>
    </div>

    <div class="app-container">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header"></div>
            <div class="chat-list" id="chatList"></div>
        </div>

        <div class="main-chat">
            <div class="chat-header">
                <div class="header-left">
                    <button class="menu-btn" id="menuBtn">☰</button>
                    <h1>Zyths AI</h1>
                </div>
                <div class="header-right">
                    <button class="api-system-btn" id="apiSystemBtn">API System</button>
                    <button class="new-chat-icon" id="newChatBtn">+</button>
                </div>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="message bot">
                    <div class="message-name">Zyths AI</div>
                    <div class="bubble">Halo!, saya Zyths AI. Ada yang bisa saya bantu?</div>
                </div>
            </div>

            <div class="api-input" id="apiInputContainer">
                <input type="text" id="apiKeyInput" placeholder="Masukkan API Key Google Gemini..." autocomplete="off">
                <button id="saveApiBtn">Simpan</button>
            </div>

            <div class="input-area">
                <input type="text" id="userInput" placeholder="Ketik pertanyaanmu di sini...">
                <button class="btn-send" id="sendBtn">Kirim</button>
            </div>
        </div>
    </div>

    <script>
        const introScreen = document.getElementById('introScreen');
        setTimeout(() => introScreen.classList.add('hide'), 8000);

        const chatMessages = document.getElementById('chatMessages');
        function scrollToBottom() {
            setTimeout(() => {
                chatMessages.scrollTo({
                    top: chatMessages.scrollHeight,
                    behavior: 'smooth'
                });
            }, 50);
        }

        let chats = [];
        let activeChatId = null;
        let API_KEY = localStorage.getItem('zythsai_api_key') || '';
        let longPressTimer = null;
        let currentPressItem = null;

        // SIDEBAR SWIPE GESTURE
        const sidebarEl = document.getElementById('sidebar');
        const overlayEl = document.getElementById('sidebarOverlay');
        let touchStartX = 0;
        let touchStartY = 0;
        
        function openSidebar() { 
            sidebarEl.classList.add('open'); 
            overlayEl.classList.add('show'); 
        }
        function closeSidebar() { 
            sidebarEl.classList.remove('open'); 
            overlayEl.classList.remove('show'); 
        }
        
        // Tombol menu
        document.getElementById('menuBtn').onclick = openSidebar;
        overlayEl.onclick = closeSidebar;
        
        // SWIPE GESTURE (touch)
        document.body.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        
        document.body.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;
            
            // Horizontal swipe (abaikan jika terlalu banyak vertical)
            if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 50) {
                if (deltaX > 0 && touchStartX < 30) {
                    // Swipe kanan dari tepi kiri -> buka sidebar
                    openSidebar();
                } else if (deltaX < 0 && sidebarEl.classList.contains('open')) {
                    // Swipe kiri -> tutup sidebar
                    closeSidebar();
                }
            }
        });

        function loadChats() {
            const saved = localStorage.getItem('zythsai_chats');
            if (saved) {
                chats = JSON.parse(saved);
            } else {
                chats = [{
                    id: Date.now().toString(),
                    title: "Obrolan Baru",
                    messages: [{ role: "assistant", content: "Halo!, saya Zyths AI. Ada yang bisa saya bantu?" }]
                }];
            }
            activeChatId = localStorage.getItem('zythsai_activeChat') || chats[0]?.id;
            if (!chats.find(c => c.id === activeChatId) && chats.length) activeChatId = chats[0].id;
            saveChats();
            renderChatList();
            renderCurrentChat();
        }
        function saveChats() {
            localStorage.setItem('zythsai_chats', JSON.stringify(chats));
            localStorage.setItem('zythsai_activeChat', activeChatId);
        }
        
        function renderChatList() {
            const container = document.getElementById('chatList');
            if (!container) return;
            container.innerHTML = '';
            chats.forEach(chat => {
                const div = document.createElement('div');
                div.className = `chat-item ${chat.id === activeChatId ? 'active' : ''}`;
                div.innerHTML = `<span class="chat-title">${escapeHtml(chat.title)}</span>`;
                
                // KLIK UNTUK PINDAH OBROLAN (FIXED!)
                div.onclick = (e) => {
                    e.stopPropagation();
                    if (chat.id !== activeChatId) {
                        activeChatId = chat.id;
                        saveChats();
                        renderChatList();
                        renderCurrentChat();
                    }
                    closeSidebar();
                };
                
                // LONG PRESS untuk hapus
                div.ontouchstart = (e) => {
                    e.preventDefault();
                    currentPressItem = div;
                    div.classList.add('press');
                    longPressTimer = setTimeout(() => {
                        if (currentPressItem === div) {
                            if (chats.length === 1) {
                                alert("Tidak bisa menghapus obrolan terakhir!");
                            } else {
                                if (confirm(`Hapus obrolan "${chat.title}"?`)) {
                                    chats = chats.filter(c => c.id !== chat.id);
                                    if (activeChatId === chat.id) activeChatId = chats[0].id;
                                    saveChats();
                                    renderChatList();
                                    renderCurrentChat();
                                }
                            }
                        }
                        div.classList.remove('press');
                        currentPressItem = null;
                    }, 500);
                };
                div.ontouchend = () => {
                    clearTimeout(longPressTimer);
                    div.classList.remove('press');
                    currentPressItem = null;
                };
                div.ontouchmove = () => {
                    clearTimeout(longPressTimer);
                    div.classList.remove('press');
                    currentPressItem = null;
                };
                div.onmousedown = (e) => {
                    currentPressItem = div;
                    div.classList.add('press');
                    longPressTimer = setTimeout(() => {
                        if (currentPressItem === div) {
                            if (chats.length === 1) {
                                alert("Tidak bisa menghapus obrolan terakhir!");
                            } else {
                                if (confirm(`Hapus obrolan "${chat.title}"?`)) {
                                    chats = chats.filter(c => c.id !== chat.id);
                                    if (activeChatId === chat.id) activeChatId = chats[0].id;
                                    saveChats();
                                    renderChatList();
                                    renderCurrentChat();
                                }
                            }
                        }
                        div.classList.remove('press');
                        currentPressItem = null;
                    }, 500);
                };
                div.onmouseup = () => {
                    clearTimeout(longPressTimer);
                    div.classList.remove('press');
                    currentPressItem = null;
                };
                div.onmouseleave = () => {
                    clearTimeout(longPressTimer);
                    div.classList.remove('press');
                    currentPressItem = null;
                };
                container.appendChild(div);
            });
        }
        
        function escapeHtml(text) { 
            return text.replace(/[&<>]/g, function(m) { 
                return { '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]; 
            }); 
        }
        
        function renderCurrentChat() {
            const chat = chats.find(c => c.id === activeChatId);
            if (!chat) return;
            const container = document.getElementById('chatMessages');
            container.innerHTML = '';
            chat.messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message ${msg.role === 'user' ? 'user' : 'bot'}`;
                div.innerHTML = `<div class="message-name">${msg.role === 'user' ? 'Kamu' : 'Zyths AI'}</div><div class="bubble">${msg.role === 'user' ? escapeHtml(msg.content).replace(/\n/g,'<br>') : parseMarkdown(msg.content)}</div>`;
                container.appendChild(div);
            });
            scrollToBottom();
        }

        function createNewChat() {
            const newChat = {
                id: Date.now().toString(),
                title: "Obrolan Baru",
                messages: [{ role: "assistant", content: "Halo!, saya Zyths AI. Ada yang bisa saya bantu?" }]
            };
            chats.unshift(newChat);
            activeChatId = newChat.id;
            saveChats();
            renderChatList();
            renderCurrentChat();
            closeSidebar();
        }
        document.getElementById('newChatBtn').onclick = createNewChat;

        function addMessageToChat(text, isUser = true) {
            const chat = chats.find(c => c.id === activeChatId);
            if (!chat) return;
            chat.messages.push({ role: isUser ? 'user' : 'assistant', content: text });
            if (isUser && chat.messages.filter(m => m.role === 'user').length === 1) {
                chat.title = text.slice(0, 30) + (text.length > 30 ? '...' : '');
            }
            saveChats();
            renderChatList();
            renderCurrentChat();
            scrollToBottom();
        }

        function parseMarkdown(text) {
            let html = text;
            html = html.replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[m]));
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
            html = html.replace(/^### (.*?)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.*?)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.*?)$/gm, '<h1>$1</h1>');
            html = html.replace(/^[\*\-\•]\s+(.+)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*?<\/li>\n?)+/g, '<ul>$&</ul>');
            html = html.replace(/`(.*?)`/g, '<code>$1</code>');
            html = html.replace(/\*{1,2}/g, '');
            html = html.replace(/\n/g, '<br>');
            return html;
        }

        function showTyping() {
            const container = document.getElementById('chatMessages');
            const typing = document.createElement('div');
            typing.className = 'message bot';
            typing.id = 'typingIndicator';
            typing.innerHTML = `<div class="message-name">Zyths AI</div><div class="typing-indicator"><span></span><span></span><span></span></div>`;
            container.appendChild(typing);
            scrollToBottom();
        }
        function hideTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
            scrollToBottom();
        }

        async function callGeminiAPI(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            if (!res.ok) throw new Error((await res.json()).error?.message || 'API Error');
            return (await res.json()).candidates[0].content.parts[0].text;
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const msg = input.value.trim();
            if (!msg) return;
            if (!API_KEY) {
                addMessageToChat("⚠️ Masukkan API Key Google Gemini dulu!", false);
                input.value = '';
                return;
            }
            addMessageToChat(msg, true);
            input.value = '';
            showTyping();
            try {
                const reply = await callGeminiAPI(msg);
                hideTyping();
                addMessageToChat(reply, false);
            } catch (err) {
                hideTyping();
                addMessageToChat(`❌ ${err.message}`, false);
            }
        }
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('userInput').addEventListener('keypress', e => { if(e.key === 'Enter') sendMessage(); });

        const apiContainer = document.getElementById('apiInputContainer');
        if (API_KEY) apiContainer.classList.add('hide');
        document.getElementById('apiSystemBtn').onclick = () => {
            if (confirm("Reset API Key?")) {
                localStorage.removeItem('zythsai_api_key');
                API_KEY = '';
                apiContainer.classList.remove('hide');
                document.getElementById('apiKeyInput').value = '';
                addMessageToChat("🔑 API Key direset. Masukkan API Key baru.", false);
            }
        };
        document.getElementById('saveApiBtn').onclick = () => {
            const key = document.getElementById('apiKeyInput').value.trim();
            if (key && key.startsWith('AIza')) {
                API_KEY = key;
                localStorage.setItem('zythsai_api_key', key);
                apiContainer.classList.add('hide');
                addMessageToChat("✅ API Key berhasil disimpan!", false);
            } else {
                addMessageToChat("❌ API Key tidak valid!", false);
            }
        };

        loadChats();
    </script>
</body>
    </html>
